  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ng:.2em;color:#9fb0ff;text-transform:uppercase;margin-bottom:18px\">Our stack<\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(26px,3.4vw,40px);line-height:1.05;letter-spacing:-.03em;color:#fff;margin-bottom:18px;text-wrap:balance\">One team across<br>the entire stack.<\u002Fh2>\n        <p style=\"font-size:clamp(15px,1.4vw,17px);line-height:1.65;color:#aeb2bb;max-width:34em\">The engineer designing your data model is the same one shaping the screen it appears on. That continuity keeps full-stack work fast, consistent and accountable — fewer translation layers, fewer surprises, from first commit to production.<\u002Fp>\n      <\u002Fdiv>\n      <div data-reveal=\"\" class=\"di-stack-term\" style=\"max-width:560px\">\n        <div style=\"border:1px solid #20232b;border-radius:14px;overflow:hidden;background:#0a0b0d;box-shadow:0 30px 70px -36px rgba(0,0,0,.85)\">\n          <div style=\"display:flex;align-items:center;gap:8px;padding:12px 15px;border-bottom:1px solid #1b1e25;background:#101217\">\n            <span style=\"width:11px;height:11px;border-radius:50%;background:#3a3d44\"><\u002Fspan>\n            <span style=\"width:11px;height:11px;border-radius:50%;background:#3a3d44\"><\u002Fspan>\n            <span style=\"width:11px;height:11px;border-radius:50%;background:#3a3d44\"><\u002Fspan>\n            <span style=\"margin-left:10px;font-family:var(--label);font-size:12px;color:#5b6069\">stack — zsh<\u002Fspan>\n          <\u002Fdiv>\n          <pre style=\"margin:0;padding:18px 20px;min-height:224px;font-family:var(--label);font-size:12.5px;line-height:1.9;color:#cdd0d6;white-space:pre-wrap;word-break:break-word\"><\u002Fpre>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CAPABILITIES -->\n  <section id=\"capabilities\" data-nav=\"light\" style=\"padding:clamp(68px,9vw,128px) clamp(20px,5vw,56px)\">\n    <div style=\"max-width:1240px;margin:0 auto\">\n      <div data ottom:18px\">/03<\u002Fdiv>\n          <h3 style=\"position:relative;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;letter-spacing:-.02em;margin-bottom:11px\">AI Integration<\u002Fh3>\n          <p style=\"position:relative;font-size:14.5px;line-height:1.6;color:#b9bdc7;margin-bottom:20px\">Practical AI woven into real products — copilots, search, automation and LLM pipelines that ship to production, not demos.<\u002Fp>\n          <div style=\"position:relative;display:flex;flex-wrap:wrap;gap:7px\">\n            <span style=\"font-family:var(--label);font-size:11.5px;color:#cfd3dc;border:1px solid #2c2f37;border-radius:7px;padding:4px 9px\">LLMs<\u002Fspan>\n            <span style=\"font-family:var(--label);font-size:11.5px;color:#cfd3dc;border:1px solid #2c2f37;border-radius:7px;padding:4px 9px\">RAG<\u002Fspan>\n            <span style=\"font-family:var(--label);font-size:11.5px;color:#cfd3dc;border:1px solid #2c2f37;border-radius:7px;padding:4px 9px\">Automation<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n\n        <article data-reveal=\"\" style=\"background:#f1eee7;border:1px solid #d3cec3;border-radius:18px;padding:30px 28px;transition:transform .2s ease,box-shadow .25s ease,border-color .2s ease\" style-hover=\"transform:translateY(-4px);box-shadow:0 24px 50px -28px rgba(12,13,15,.32);border-color:#d6d3c8\">\n          <div style=\"font-family:var(--label);font-size:13px;color:var(--accent);margin-bottom:18px\">/04<\u002Fdiv>\n          <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;letter-spacing:-.02em;margin-bottom:11px\">Desktop &amp; Real-time Graphics<\u002Fh3>\n          <p style=\"font-size:14.5px;line-height:1.6;color:#5b5f67;margin-bottom:20px\">Cross-platform desktop apps and custom graphics engines — rich, interactive, GPU-accelerated experiences.<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px\">\n            <span style=\"font-family:var(--label);fon ata-nav=\"light\" style=\"padding:clamp(68px,9vw,128px) clamp(20px,5vw,56px)\">\n    <div style=\"max-width:1240px;margin:0 auto\">\n      <div data-reveal=\"\" style=\"margin-bottom:clamp(40px,5vw,64px);max-width:42em\">\n        <div style=\"font-family:var(--label);font-size:12px;letter-spacing:.18em;color:var(--accent);text-transform:uppercase;margin-bottom:16px\">03 — How we work<\u002Fdiv>\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(30px,4.4vw,52px);line-height:1.02;letter-spacing:-.03em\">Four things we refuse to compromise on.<\u002Fh2>\n      <\u002Fdiv>\n\n      <!-- principles as editorial big-number rows -->\n      <div data-reveal=\"\" style=\"border-top:1px solid #e2dfd6;margin-bottom:clamp(44px,6vw,76px)\">\n        <div style=\"display:grid;grid-template-columns:clamp(58px,9vw,128px) 1fr auto;gap:clamp(16px,3vw,48px);align-items:center;padding:clamp(22px,3vw,38px) clamp(4px,1vw,14px);border-bottom:1px solid #cbc5ba;transition:background .25s ease,padding-left .25s ease\" style-hover=\"background:#f0ece4;padding-left:18px\">\n          <div style=\"font-family:var(--label);font-size:clamp(15px,1.7vw,22px);letter-spacing:.06em;color:#1c1d20;white-space:nowrap;display:flex;align-items:center;gap:8px\">01<\u002Fdiv>\n          <div style=\"max-width:42em\">\n            <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:clamp(20px,2.3vw,27px);letter-spacing:-.02em;margin-bottom:7px\">Speed<\u002Fh3>\n            <p style=\"font-size:clamp(14px,1.3vw,16px);line-height:1.6;color:#5b5f67\">Short feedback loops and senior hands mean working software in weeks, not quarters.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"font-family:var(--label);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);white-space:nowrap;align-self:start;padding-top:6px\">weeks, not quarters<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-c  a ✓ line\n    const task = async (label, result, dur) => {\n      const start = performance.now();\n      let f = 0;\n      while (performance.now() - start < dur) {\n        draw(c(acc, spin[f % spin.length]) + ' ' + c(dim, label), false);\n        f++;\n        await wait(90);\n      }\n      lines.push(c(grn, '✓') + ' ' + c('#4a4e56', (label + '              ').slice(0, 15)) + c(mut, result));\n      draw('', false);\n      await wait(140);\n    };\n\n    if (reduce) {\n      lines = [\n        pr + c('#1c1d20', 'di build --watch'),\n        c(grn, '✓') + ' ' + c('#4a4e56', 'compile        ') + c(mut, '142 modules'),\n        c(grn, '✓') + ' ' + c('#4a4e56', 'type-check     ') + c(mut, 'clean'),\n        c(grn, '✓') + ' ' + c('#4a4e56', 'build          ') + c(mut, '2.3s'),\n        c(acc, '●') + ' ' + c(dim, 'watching for changes…'),\n      ];\n      draw('', true);\n      return;\n    }\n\n    let fi = 0;\n    (async () => {\n      while (true) {\n        lines = [];\n        draw('', true);\n        await wait(700);\n\n        // initial full build\n        await typeCmd('di build --watch');\n        await task('compile components', '142 modules', 1100);\n        await task('type-check', 'clean', 700);\n        await task('bundle', '2.3s', 900);\n        lines.push(c(acc, '●') + ' ' + c(dim, 'watching for changes…'));\n        draw('', true);\n        await wait(1600);\n\n        // a few incremental rebuilds — feels like active coding\n        const edits = 2 + Math.floor(Math.random() * 2);\n        for (let e = 0; e < edits; e++) {\n          const file = files[fi++ % files.length];\n          // drop the \"watching…\" line, show the change\n          lines.pop();\n          lines.push(c(dim, '~ ') + c(fil, 'src/' + file) + c(dim, ' changed'));\n          draw('', false);\n          await wait(420);\n          await task('rebuild ' + file.split('/').pop(), (0.3 + Math.random() * 0.5).toFixed(1) + 's', 620 + Math.random() * 500);\n          lines.push(c(acc, '●') + ' ' + c(dim, 'watching for changes…'));\n          draw('', true);\n          await wait(1500 + Math.random() * 900);\n\n          // bound memory; older lines scroll up out of the fixed window\n          if (lines.length > 40) lines = lines.slice(lines.length - 40);\n        }\n        await wait(900);\n      }\n    })();\n  }\n\n  _runTerminal(term, reduce) {\n    const cmd = 'studio stack --list';\n    const rows = [\n      ['backend', '.NET · Node.js · Express'],\n      ['frontend', 'Angular · React · Next.js · TypeScript'],\n      ['data', 'SQL Server · PostgreSQL · Redis'],\n      ['devops', 'Docker · AWS · Azure · GitHub Actions'],\n      ['graphics', 'Electron · GSAP · Three.js'],\n    ];\n    const pad = (s) => (s + '            ').slice(0, 12);\n    const cur = '<span style=\"display:inline-block;width:8px;height:14px;background:var(--accent);vertical-align:-2px;margin-left:3px;animation:di-blink 1.1s step-end infinite\"><\u002Fspan>';\n    const pr = '<span style=\"color:var(--accent)\">$<\u002Fspan> ';\n    const rowHtml = (k, v) => '<span style=\"color:#9fb0ff\">' + pad(k) + '<\u002Fspan><span style=\"color:#cdd0d6\">' + v + '<\u002Fspan>';\n    const ok = '<span style=\"color:#7dd8a8\">✓<\u002Fspan> <span style=\"color:#9398a2\">21 technologies ready<\u002Fspan>';\n    if (reduce) {\n      term.innerHTML = pr + '<span style=\"color:#e7e9ee\">' + cmd + '<\u002Fspan>\\n<span style=\"color:#6b7080\">resolving toolkit…<\u002Fspan>\\n' + rows.map((r) => rowHtml(r[0], r[1])).join('\\n') + '\\n' + ok;\n      return;\n    }\n    let html = '';\n    const render = (c) => { term.innerHTML = html + (c ? cur : ''); };\n    const wait = (ms) => new Promise((res) => setTimeout(res, ms));\n    (async () => {\n      while (true) {\n        html = ''; render(true); await wait(650);\n        let typed = '';\n        for (let i = 0; i < cmd.length; i++) { typed += cmd[i]; html = pr + '<span style=\"color:#e7e9ee\">' + typed + '<\u002Fspan>'; render(true); await wait(48); }\n        await wait(420);\n        html += '\\n<span style=\"color:#6b7080\">resolving toolkit…<\u002Fspan>'; render(false); await wait(560);\n        for (let j = 0; j < rows.length; j++) { html += '\\n' + rowHtml(rows[j][0], rows[j][1]); render(false); await wait(280); }\n        await wait(280);\n        html += '\\n' + ok; render(true); await wait(3400);\n      }\n    })();\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
